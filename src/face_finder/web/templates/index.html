<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WhatsApp Face Finder</title>
  <style>
    :root { --fg:#1c1c1e; --muted:#6b7280; --border:#d1d5db; --accent:#2563eb; --bg:#f7f7f8; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, system-ui, sans-serif; color: var(--fg);
           background: var(--bg); margin: 0; padding: 2rem; }
    .card { max-width: 760px; margin: 0 auto; background: #fff; border: 1px solid var(--border);
            border-radius: 12px; padding: 1.5rem 1.75rem; }
    h1 { font-size: 1.4rem; margin: 0 0 0.25rem; }
    p.sub { color: var(--muted); margin: 0 0 1.5rem; font-size: 0.9rem; }
    label { display: block; font-weight: 600; font-size: 0.85rem; margin: 0.9rem 0 0.3rem; }
    .row { display: flex; gap: 0.5rem; }
    input[type=text] { flex: 1; padding: 0.5rem 0.6rem; border: 1px solid var(--border);
            border-radius: 8px; font-size: 0.9rem; font-family: ui-monospace, monospace; }
    input#threshold { max-width: 8rem; font-family: inherit; }
    button { padding: 0.5rem 0.9rem; border: 1px solid var(--border); background: #fff;
             border-radius: 8px; cursor: pointer; font-size: 0.85rem; }
    button:hover { background: #f0f0f3; }
    button.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
    button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .controls { margin-top: 1.5rem; display: flex; align-items: center; gap: 1rem; }
    progress { width: 100%; height: 14px; }
    #progressWrap { margin-top: 1.25rem; display: none; }
    #statusText { font-size: 0.9rem; margin-top: 0.4rem; }
    #phase { color: var(--muted); font-size: 0.82rem; }
    .ok { color: #15803d; } .err { color: #b91c1c; }
    /* modal */
    #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
             align-items: center; justify-content: center; }
    #modal .inner { background: #fff; width: min(560px, 92vw); max-height: 80vh; border-radius: 12px;
             padding: 1.25rem; display: flex; flex-direction: column; }
    #curPath { font-family: ui-monospace, monospace; font-size: 0.8rem; color: var(--muted);
             word-break: break-all; margin: 0.5rem 0; }
    #dirList { flex: 1; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; }
    .entry { padding: 0.5rem 0.7rem; cursor: pointer; border-bottom: 1px solid #f0f0f3; font-size: 0.88rem; }
    .entry:hover { background: #eff3ff; }
    .file-entry { display: flex; align-items: center; gap: 0.5rem; padding: 0.45rem 0.7rem;
             border-bottom: 1px solid #f0f0f3; font-size: 0.88rem; cursor: pointer; }
    .file-entry:hover { background: #eff3ff; }
    .file-entry input { margin: 0; }
    .modal-actions { display: flex; justify-content: space-between; margin-top: 1rem; }
    /* reference thumbnails */
    .muted { color: var(--muted); font-size: 0.85rem; align-self: center; }
    .thumbs { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.6rem; }
    .thumb { position: relative; width: 72px; height: 72px; border-radius: 8px;
             overflow: hidden; border: 1px solid var(--border); background: #f0f0f3; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb-rm { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; padding: 0;
             line-height: 16px; text-align: center; border-radius: 50%; border: none;
             background: rgba(0,0,0,0.6); color: #fff; font-size: 0.7rem; cursor: pointer; }
    .thumb-rm:hover { background: rgba(0,0,0,0.8); }
  </style>
</head>
<body>
  <div class="card">
    <h1>WhatsApp Face Finder</h1>
    <p class="sub">Pick folders, set a threshold, and run. Matches are copied to the output folder with a <code>matches.csv</code> report.</p>

    <label>Media folder (images to scan)</label>
    <div class="row">
      <input type="text" id="media" value="{{ default_media }}">
      <button onclick="openBrowser('media')">Browse…</button>
    </div>

    <label>Output folder (where matches are copied)</label>
    <div class="row">
      <input type="text" id="output" value="{{ default_output }}">
      <button onclick="openBrowser('output')">Browse…</button>
    </div>

    <label>Reference images (photos of the target person)</label>
    <div class="row">
      <button onclick="openFilePicker()">Add images…</button>
      <span id="refCount" class="muted"></span>
    </div>
    <div id="refThumbs" class="thumbs"></div>

    <label>Match threshold</label>
    <input type="text" id="threshold" value="{{ default_threshold }}" inputmode="decimal">

    <div class="controls">
      <button class="primary" id="runBtn" onclick="run()">Run</button>
      <span id="phase"></span>
    </div>

    <div id="progressWrap">
      <progress id="bar" value="0" max="100"></progress>
      <div id="statusText"></div>
    </div>
  </div>

  <!-- Folder browser modal -->
  <div id="modal">
    <div class="inner">
      <strong id="modalTitle">Select a folder</strong>
      <div id="curPath"></div>
      <div id="dirList"></div>
      <div class="modal-actions">
        <button onclick="closeBrowser()">Cancel</button>
        <button class="primary" id="modalConfirm" onclick="confirmModal()">Use this folder</button>
      </div>
    </div>
  </div>

  <script>
    let mode = "folder";        // "folder" (media/output) | "files" (reference)
    let targetField = null;     // which input the folder browser is filling
    let currentPath = null;     // path shown in the browser
    let lastRefDir = "{{ default_reference_dir }}";  // remember where we picked references
    let references = [];        // selected reference image paths
    let picked = null;          // working Set of paths while the file picker is open
    let pollTimer = null;

    function joinPath(dir, name) { return dir.replace(/\/$/, "") + "/" + name; }

    async function openBrowser(field) {
      mode = "folder";
      targetField = field;
      document.getElementById("modalTitle").textContent = "Select a folder";
      document.getElementById("modalConfirm").textContent = "Use this folder";
      await navigate(document.getElementById(field).value || "");
      document.getElementById("modal").style.display = "flex";
    }
    async function openFilePicker() {
      mode = "files";
      picked = new Set(references);
      document.getElementById("modalTitle").textContent = "Select reference images";
      document.getElementById("modalConfirm").textContent = "Add selected";
      await navigate(lastRefDir);
      document.getElementById("modal").style.display = "flex";
    }
    function closeBrowser() { document.getElementById("modal").style.display = "none"; }

    async function navigate(path) {
      const url = "/api/browse?path=" + encodeURIComponent(path) + (mode === "files" ? "&files=1" : "");
      const res = await fetch(url);
      const data = await res.json();
      currentPath = data.path;
      if (mode === "files") lastRefDir = data.path;
      document.getElementById("curPath").textContent = data.path;
      const list = document.getElementById("dirList");
      list.innerHTML = "";
      if (data.parent) addDirEntry(list, "📁 ..", data.parent);
      for (const d of data.dirs) addDirEntry(list, "📁 " + d, joinPath(data.path, d));
      if (mode === "files") for (const f of data.files) addFileEntry(list, f, joinPath(data.path, f));
    }
    function addDirEntry(list, label, path) {
      const el = document.createElement("div");
      el.className = "entry"; el.textContent = label;
      el.onclick = () => navigate(path);
      list.appendChild(el);
    }
    function addFileEntry(list, name, path) {
      const row = document.createElement("label");
      row.className = "file-entry";
      const cb = document.createElement("input");
      cb.type = "checkbox"; cb.checked = picked.has(path);
      cb.onchange = () => { cb.checked ? picked.add(path) : picked.delete(path); };
      row.appendChild(cb);
      row.appendChild(document.createTextNode("🖼️ " + name));
      list.appendChild(row);
    }
    function confirmModal() {
      if (mode === "files") {
        references = Array.from(picked);
        renderThumbs();
      } else {
        document.getElementById(targetField).value = currentPath;
      }
      closeBrowser();
    }

    function renderThumbs() {
      const wrap = document.getElementById("refThumbs");
      wrap.innerHTML = "";
      document.getElementById("refCount").textContent =
        references.length ? `${references.length} image(s) selected` : "No images selected";
      for (const p of references) {
        const cell = document.createElement("div");
        cell.className = "thumb";
        const img = document.createElement("img");
        img.src = "/api/thumb?path=" + encodeURIComponent(p);
        img.title = p; img.loading = "lazy";
        const rm = document.createElement("button");
        rm.className = "thumb-rm"; rm.textContent = "✕"; rm.title = "Remove";
        rm.onclick = () => { references = references.filter(x => x !== p); renderThumbs(); };
        cell.appendChild(img); cell.appendChild(rm);
        wrap.appendChild(cell);
      }
    }

    async function run() {
      const body = {
        media: document.getElementById("media").value,
        output: document.getElementById("output").value,
        references: references,
        threshold: document.getElementById("threshold").value,
      };
      const res = await fetch("/api/run", {
        method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) { setPhase(data.error || "Failed to start", true); return; }
      document.getElementById("runBtn").disabled = true;
      document.getElementById("progressWrap").style.display = "block";
      poll();
    }

    function setPhase(text, isErr) {
      const el = document.getElementById("phase");
      el.textContent = text;
      el.className = isErr ? "err" : "";
    }

    async function poll() {
      const res = await fetch("/api/status");
      const s = await res.json();
      const bar = document.getElementById("bar");
      const status = document.getElementById("statusText");

      if (s.total > 0) { bar.max = s.total; bar.value = s.done; }
      setPhase(s.phase, s.state === "error");

      if (s.state === "running") {
        status.textContent = `Scanning ${s.done}/${s.total} — ${s.matches} match(es)`;
        pollTimer = setTimeout(poll, 1000);
      } else if (s.state === "done") {
        bar.value = bar.max;
        status.innerHTML = `<span class="ok">${s.message}</span><br>Manifest: <code>${s.manifest}</code>`;
        document.getElementById("runBtn").disabled = false;
      } else if (s.state === "error") {
        status.innerHTML = `<span class="err">${s.message}</span>`;
        document.getElementById("runBtn").disabled = false;
      }
    }

    renderThumbs();  // show the initial "No images selected" hint
  </script>
</body>
</html>
